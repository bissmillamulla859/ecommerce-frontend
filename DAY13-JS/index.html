<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //datatypes means different type data

        //1.string-anything between quotes ,simple form of text

        var city="pune"
        console.log(city)
        console.log("the city name is",city)

        //typeof(value)-helps us to check dataype
        console.log(typeof(city))

        var password=1234
        console.log(typeof(password))


        //2.number -ve, decimal, whole number
        var age=18
        console.log(age)
        var height=6.0
        console.log(typeof(height))
        var temp=-4
        console.log(typeof(temp))

        //boolean- true or false
        var ISLoggedin=true
        console.log(typeof(ISLoggedin))
        var netflixsubscription="true"
        console.log(typeof(netflixsubscription))
        var canwatch=false
        console.log(typeof(canwatch))

    </script>
</body>
</html>
