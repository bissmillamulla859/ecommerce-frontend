<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: arial;
            padding: 20px;
        }
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid black;
            padding: 10px;

        }

        nav a{
            display: inline;
            padding: 8px;
            border: 1px solid black;
            margin-left: 15px;
            text-decoration: none;
            color: rgb(36, 15, 154);
        }
        nav a:hover{
            background-color: black;
            color: white;
        }
        catogories{
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        category{
            border: 1px solid black;
        }
        category :hover{
            background-color: black;
            color: white;
            transform: 2s;
        }
        .movies{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            margin: top 10px; 
        }
        .movie-card{
            border: 2px solid black;
            padding: 40px;
            text-align: center;
        }
        .movie-card:hover{

            background-color: black;
            color: white;
            transform: 2s;
        }


    </style>
</head>
<body>
     <!--netflix movie categories layout-->
    <header>
        <h1>Movie zone</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">Series</a>
            <a href="#">Mylist</a>
        </nav>
    </header>
    <section class="catogories">
        <div class="category">Comedy</div>

        <div class="category">Horror</div>

        <div class="category">Story</div>
    </section>
    
    <section class="movies">

        <div class="movie-card">
            <h3>Balmar</h3>
        </div>

        <div class="movie-card">
            <h3>Enertaiment</h3>
        </div>

        <div class="movie-card">
            <h3>ABCD</h3>
        </div>

        <div class="movie-card">
            <h3>BELL BOTTOM</h3>
        </div>
        <div class="movie-card">
            <h3>BELL BOTTOM</h3>
        </div>
        <div class="movie-card">
            <h3>BELL BOTTOM</h3>
        </div>



    </section>
</body>
</html>
