<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--DATA LIST TAG-->
    <input list="food">

    <label>Food</label>
    <datalist id="food">
        <option value="pizza">
        <option value="paneer roll">
        <option value="burger">
        <option value="french fries">
        <option value="ice-cream">
    </datalist>
    <label>location</label>
    <input list="location">
    <datalist id="location">
        <option value="INDIA">
        <option value="DELHI">
        <option value="BANGLURU">
        <option value="CHENNAI">
        <option value="PUNE">
    </datalist>
</body>
</html>
