<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .products{
            display: gird;
            /* grid-template-columns: repeat(no of column, size of each colum);*/
            /*grid-template-columns: repeat(3,1fr);*/
            background-color: aqua;
            padding: 10px;
            gap: 25px;
            grid-template-columns: repeat(auto-fit,minmax(200px , 1fr));
        }

        .box{
            border: 1px solid black;
            background-color: blanchedalmond;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="products">
        <div class="box">Cake</div>
        <div class="box">Price$50</div>
        <div class="box">Cookie</div>
        <div class="box">Price $25</div>
        <div class="box">Pastery</div>
        <div class="box">Price $29</div>
    </div>
</body>
</html>
