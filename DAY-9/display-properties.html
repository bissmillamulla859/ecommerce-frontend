<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: red;
        }
        div .ex1{
            display: none;
             display: block;
    
        }
        div .ex3{
           display: inline;
           background-color: blueviolet;
        }
    </style>
</head>
<body>
    <div>
        Display:None, properties means to show nothing/it will hide the content
        <p class="ex1">Hello Display None</p>
    </div>
    <div>
        display : block,It is similar to div container,it takes 100%
        <p class="ex2">Hello Display Block</p>
    </div>
    <div>
        display : inline,It is similar to span tag
        <p class="ex3">Hello display inline</p>
    </div>
</body>
</html>
